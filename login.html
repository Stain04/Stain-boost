<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login · StainBoost</title>
<link rel="stylesheet" href="shared.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@900&family=Inter:wght@400;500;600&display=block" rel="stylesheet">
<style>
:root{--purple:#7c3aed;--cyan:#06d6f2;--err:#f87171;--ok:#34d399;--muted:rgba(255,255,255,0.35);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#060411;color:#e8e4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

.wrap{width:100%;max-width:440px;z-index:1;}
.brand{text-align:center;margin-bottom:32px;}
.brand-name{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#06d6f2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;}
.brand-sub{font-size:13px;color:var(--muted);margin-top:4px;}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:36px;backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,0.5);}
.back{display:block;text-align:center;margin-top:20px;color:var(--muted);font-size:13px;text-decoration:none;}
.back:hover{color:#e8e4f0;}

/* Tabs */
.tabs{display:flex;background:rgba(0,0,0,0.3);border-radius:10px;padding:4px;margin-bottom:28px;gap:4px;}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.tab.active{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;box-shadow:0 4px 16px rgba(124,58,237,0.4);}

/* Inputs */
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
input[type=text],input[type=email],input[type=password]{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
input:focus{border-color:var(--purple);}
input::placeholder{color:rgba(255,255,255,0.2);}

/* Role picker */
.role-row{display:flex;gap:8px;margin-bottom:16px;}
.role-btn{flex:1;padding:10px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.role-btn.selected{border-color:var(--cyan);color:var(--cyan);background:rgba(6,214,242,0.08);}

/* Buttons */
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#7c3aed,#06d6f2);border:none;border-radius:8px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:opacity .2s;margin-top:4px;}
.btn-primary:hover{opacity:.88;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-danger{width:100%;padding:10px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;color:var(--err);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:16px;}
.btn-danger:hover{background:rgba(248,113,113,0.2);}

/* Status messages */
.msg{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;display:none;}
.msg.ok {display:block;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);color:var(--ok);}
.msg.err{display:block;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--err);}

/* User panel */
.user-panel{text-align:center;}
.avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#06d6f2);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;font-family:'Orbitron',sans-serif;margin:0 auto 12px;}
.uname{font-size:20px;font-weight:700;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
.role-badge{display:inline-block;margin-top:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.role-badge.admin   {background:rgba(245,166,35,0.15);color:#f5a623;border:1px solid rgba(245,166,35,0.3);}
.role-badge.customer{background:rgba(124,58,237,0.15);color:#c4b5fd; border:1px solid rgba(124,58,237,0.3);}
.uemail{font-size:13px;color:var(--muted);margin-top:6px;}

/* Collapsible sections inside the user panel */
.section{margin-top:20px;border-top:1px solid rgba(255,255,255,0.07);padding-top:16px;text-align:left;display:none;}
.section.show{display:block;}
.sec-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}

/* Order items (admin orders list) */
.order-list{max-height:180px;overflow-y:auto;}
.order-item{padding:10px 12px;background:rgba(245,166,35,0.05);border:1px solid rgba(245,166,35,0.15);border-radius:8px;margin-bottom:6px;font-size:12px;}
.order-item .oname{font-weight:600;color:#f5a623;}
.order-item .oact {color:var(--muted);margin-top:2px;}

/* User rows (permissions management) */
.urow{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(6,214,242,0.04);border:1px solid rgba(6,214,242,0.12);border-radius:8px;margin-bottom:6px;}
.urow .uinfo2{font-size:13px;font-weight:600;}
.urow .umeta {font-size:11px;color:var(--muted);margin-top:2px;}
.ubtns{display:flex;gap:5px;}
/* all small action buttons share the same base style */
.ubtn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;transition:all .2s;}
.ubtn.promote{background:rgba(245,166,35,0.12);color:#f5a623;border-color:rgba(245,166,35,0.3);}
.ubtn.demote {background:rgba(248,113,113,0.12);color:var(--err);border-color:rgba(248,113,113,0.3);}
.ubtn.del    {background:rgba(248,113,113,0.08);color:var(--err);border-color:rgba(248,113,113,0.2);}
.ubtn:disabled{opacity:.4;cursor:not-allowed;}
</style>
</head>

<body>
<div class="wrap">

  <div class="brand">
    <div class="brand-name">STAINBOOST</div>
    <div class="brand-sub">Secure Account Access</div>
  </div>

  <!-- LOGIN / REGISTER CARD -->
  <div class="card" id="authCard">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">LOGIN</button>
      <button class="tab"        onclick="switchTab('register')">REGISTER</button>
    </div>

    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="field"><label>Username</label><input type="text"     id="lUser" placeholder="your username"    required></div>
      <div class="field"><label>Password</label><input type="password" id="lPass" placeholder="••••••••"         required></div>
      <button class="btn-primary" id="lBtn">LOGIN</button>
      <div class="msg" id="lMsg"></div>
    </form>

    <form id="regForm" onsubmit="doRegister(event)" style="display:none">
      <div class="field"><label>Username</label><input type="text"     id="rUser"  placeholder="choose a username" required></div>
      <div class="field"><label>Email</label>   <input type="email"    id="rEmail" placeholder="you@example.com"   required></div>
      <div class="field"><label>Password <span style="opacity:.5;font-size:10px">(min 8 chars)</span></label>
        <input type="password" id="rPass" placeholder="••••••••" required></div>
      <div class="field">
        <label>Role</label>
        <div class="role-row">
          <button type="button" class="role-btn selected" id="rcCustomer" onclick="setRole('customer')">Customer</button>
          <button type="button" class="role-btn"          id="rcAdmin"    onclick="setRole('admin')">Admin</button>
        </div>
      </div>
      <button class="btn-primary" id="rBtn">CREATE ACCOUNT</button>
      <div class="msg" id="rMsg"></div>
    </form>
  </div>

  <!-- USER PANEL (shown after login) -->
  <div class="card" id="userCard" style="display:none">
    <div class="user-panel">
      <div class="avatar"     id="uAvatar"></div>
      <div class="uname"      id="uName"></div>
      <div class="role-badge" id="uBadge"></div>
      <div class="uemail"     id="uEmail"></div>

      <!-- ADMIN ONLY — Criteria 3: RBAC (admin sees orders, customer cannot) -->
      <div class="section" id="ordersSection">
        <div class="sec-title" style="color:#f5a623">Recent Orders (Admin View)</div>
        <div class="order-list" id="orderList">Loading…</div>
      </div>

      <!-- ADMIN ONLY — Criteria 4: User Permissions Management -->
      <div class="section" id="usersSection">
        <div class="sec-title" style="color:var(--cyan)">User Permissions Management</div>
        <div id="usersList">Loading…</div>
      </div>

      <!-- CUSTOMER ONLY — Criteria 3: RBAC (customer panel, admin cannot access) -->
      <div class="section" id="custSection">
        <div class="sec-title" style="color:#c4b5fd">Customer Dashboard</div>
        <div id="custInfo">Loading…</div>
      </div>

      <!-- BOTH ROLES — Change Password -->
      <div class="section show">
        <div class="sec-title" style="color:#c4b5fd">Change Password</div>
        <div class="field"><input type="password" id="pwCur" placeholder="Current password"></div>
        <div class="field"><input type="password" id="pwNew" placeholder="New password (min 8 chars)"></div>
        <button class="btn-primary" id="pwBtn" onclick="doChangePassword()">UPDATE PASSWORD</button>
        <div class="msg" id="pwMsg"></div>
      </div>

      <button class="btn-danger" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <a href="/" class="back">← Back to StainBoost</a>
</div>

<script>
let selectedRole = 'customer';

// On page load — check if already logged in
window.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('sb_token');
  if (token) await loadProfile();
});

// ── Shared fetch helper — automatically adds the auth header ──
// Instead of writing headers every time, we call api() once.
async function api(url, opts = {}) {
  const token = localStorage.getItem('sb_token');
  const res = await fetch(url, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
    },
  });
  return { res, data: await res.json() };
}

// ── Show a message under any element ─────────────────────────
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type}`;
}

// ── Tab + role switchers ──────────────────────────────────────
function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('regForm').style.display   = tab === 'login' ? 'none'  : 'block';
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', i === (tab === 'login' ? 0 : 1))
  );
}

function setRole(r) {
  selectedRole = r;
  document.getElementById('rcCustomer').classList.toggle('selected', r === 'customer');
  document.getElementById('rcAdmin').classList.toggle('selected',    r === 'admin');
}

// ── Criteria 2: Authentication — LOGIN ───────────────────────
// Sends username + password → server returns a JWT token
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('lBtn');
  btn.disabled = true; btn.textContent = 'LOGGING IN…';
  try {
    const { res, data } = await api('/api/auth?action=login', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('lUser').value.trim(),
        password: document.getElementById('lPass').value,
      }),
    });
    if (!res.ok) return showMsg('lMsg', data.error || 'Login failed.', 'err');
    localStorage.setItem('sb_token', data.token); // store JWT
    await loadProfile();
  } catch { showMsg('lMsg', 'Network error.', 'err'); }
  finally  { btn.disabled = false; btn.textContent = 'LOGIN'; }
}

// ── Criteria 1: Password Security — REGISTER ─────────────────
// Server will bcrypt.hash(password + PEPPER) before storing
async function doRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('rBtn');
  btn.disabled = true; btn.textContent = 'CREATING…';
  try {
    const { res, data } = await api('/api/auth?action=register', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('rUser').value.trim(),
        email:    document.getElementById('rEmail').value.trim(),
        password: document.getElementById('rPass').value,
        role:     selectedRole,
      }),
    });
    if (!res.ok) return showMsg('rMsg', data.error || 'Registration failed.', 'err');
    localStorage.setItem('sb_token', data.token);
    await loadProfile();
  } catch { showMsg('rMsg', 'Network error.', 'err'); }
  finally  { btn.disabled = false; btn.textContent = 'CREATE ACCOUNT'; }
}

// ── Load the logged-in user's profile ─────────────────────────
async function loadProfile() {
  try {
    const { res, data } = await api('/api/auth'); // GET — verifies JWT
    if (!res.ok) { localStorage.removeItem('sb_token'); return; }
    showUserPanel(data);
  } catch { localStorage.removeItem('sb_token'); }
}

// ── Show the correct panel based on role ─────────────────────
function showUserPanel(user) {
  document.getElementById('authCard').style.display = 'none';
  document.getElementById('userCard').style.display = 'block';
  document.getElementById('uAvatar').textContent    = user.username[0].toUpperCase();
  document.getElementById('uName').textContent      = user.username;
  document.getElementById('uEmail').textContent     = user.email;
  const badge = document.getElementById('uBadge');
  badge.textContent = user.role.toUpperCase();
  badge.className   = `role-badge ${user.role}`;

  // Criteria 3: RBAC — show different sections based on role
  if (user.role === 'admin') {
    document.getElementById('ordersSection').classList.add('show');
    document.getElementById('usersSection').classList.add('show');
    loadOrders(); loadUsers();
  } else {
    document.getElementById('custSection').classList.add('show');
    loadCustomerDash();
  }
}

// ── Criteria 3: Admin sees orders, customers blocked ──────────
async function loadOrders() {
  const el = document.getElementById('orderList');
  try {
    const { res, data } = await api('/api/admin/orders');
    if (!res.ok || !data.orders?.length) { el.innerHTML = '<p style="color:var(--muted);font-size:12px">No orders yet.</p>'; return; }
    el.innerHTML = data.orders.map(o =>
      `<div class="order-item"><div class="oname">${o.name||'Anonymous'}</div><div class="oact">${o.action||''}</div></div>`
    ).join('');
  } catch { el.textContent = 'Failed to load.'; }
}

// ── Criteria 3: Customer dashboard, admins blocked ────────────
async function loadCustomerDash() {
  const el = document.getElementById('custInfo');
  try {
    const { res, data } = await api('/api/customer/dashboard');
    el.innerHTML = res.ok
      ? `<div class="order-item" style="border-color:rgba(124,58,237,0.3)"><div class="oname" style="color:#c4b5fd">${data.message}</div><div class="oact">Role: ${data.role}</div></div>`
      : `<p style="color:var(--err);font-size:12px">${data.error}</p>`;
  } catch { el.textContent = 'Failed to load.'; }
}

// ── Criteria 4: Load all users for admin to manage ───────────
async function loadUsers() {
  const el = document.getElementById('usersList');
  try {
    const { res, data } = await api('/api/admin/users');
    if (!res.ok || !data.users?.length) { el.innerHTML = '<p style="color:var(--muted);font-size:12px">No users found.</p>'; return; }
    el.innerHTML = data.users.map(u => `
      <div class="urow" id="urow-${u.username}">
        <div>
          <div class="uinfo2">${u.username}</div>
          <div class="umeta" id="umeta-${u.username}">${u.email} · <strong>${u.role}</strong></div>
        </div>
        <div class="ubtns">
          <button class="ubtn ${u.role==='admin'?'demote':'promote'}" id="ubtn-${u.username}"
            onclick="changeRole('${u.username}','${u.role==='admin'?'customer':'admin'}')">
            ${u.role==='admin'?'Demote':'Promote'}
          </button>
          <button class="ubtn del" id="udel-${u.username}" onclick="deleteUser('${u.username}')">🗑</button>
        </div>
      </div>`).join('');
  } catch { el.textContent = 'Failed to load.'; }
}

// ── Criteria 4: Promote / Demote a user ──────────────────────
async function changeRole(username, newRole) {
  const btn = document.getElementById(`ubtn-${username}`);
  btn.disabled = true; btn.textContent = '…';
  try {
    const { res, data } = await api(`/api/admin/users?user=${username}`, {
      method: 'PATCH', body: JSON.stringify({ role: newRole }),
    });
    if (res.ok) {
      document.getElementById(`umeta-${username}`).innerHTML = `${data.username} · <strong>${newRole}</strong>`;
      const opp = newRole === 'admin' ? 'customer' : 'admin';
      btn.className   = `ubtn ${newRole==='admin'?'demote':'promote'}`;
      btn.textContent = newRole === 'admin' ? 'Demote' : 'Promote';
      btn.onclick     = () => changeRole(username, opp);
    } else { btn.textContent = 'Error'; }
  } catch { btn.textContent = 'Error'; }
  finally  { btn.disabled = false; }
}

// ── Criteria 4: Delete a user ────────────────────────────────
async function deleteUser(username) {
  if (!confirm(`Delete "${username}"? This cannot be undone.`)) return;
  const btn = document.getElementById(`udel-${username}`);
  btn.disabled = true; btn.textContent = '…';
  try {
    const { res, data } = await api(`/api/admin/users?user=${username}`, { method: 'DELETE' });
    if (res.ok) document.getElementById(`urow-${username}`)?.remove();
    else { alert(data.error); btn.disabled = false; btn.textContent = '🗑'; }
  } catch { alert('Network error.'); btn.disabled = false; btn.textContent = '🗑'; }
}

// ── Criteria 1: Change Password ───────────────────────────────
// Server verifies current password before saving the new bcrypt hash
async function doChangePassword() {
  const cur = document.getElementById('pwCur').value;
  const nw  = document.getElementById('pwNew').value;
  if (!cur || !nw) return showMsg('pwMsg', 'Fill in both fields.', 'err');
  const btn = document.getElementById('pwBtn');
  btn.disabled = true; btn.textContent = 'UPDATING…';
  try {
    const { res, data } = await api('/api/auth?action=change-password', {
      method: 'POST', body: JSON.stringify({ currentPassword: cur, newPassword: nw }),
    });
    if (res.ok) {
      showMsg('pwMsg', 'Password updated!', 'ok');
      document.getElementById('pwCur').value = document.getElementById('pwNew').value = '';
    } else { showMsg('pwMsg', data.error || 'Failed.', 'err'); }
  } catch { showMsg('pwMsg', 'Network error.', 'err'); }
  finally  { btn.disabled = false; btn.textContent = 'UPDATE PASSWORD'; }
}

// ── Criteria 2: Logout — blacklists the JWT on the server ────
async function doLogout() {
  await api('/api/auth?action=logout', { method: 'POST' }).catch(() => {});
  localStorage.removeItem('sb_token');
  location.reload();
}
</script>
</body>
</html>
